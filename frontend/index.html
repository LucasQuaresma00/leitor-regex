<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Regex - Análise Inteligente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>📊 Dashboard de Processamento Regex</h1>
        <p>Análise inteligente de e-mails, CPFs, telefones, URLs e mais</p>
    </header>

    <section class="filtros">
        <h2>Filtros</h2>
        <div class="filtro-container">
            <label>Arquivo:</label>
            <select id="seletor-arquivo"></select>

            <label>Tipo de dado:</label>
            <select id="seletor-tipo"></select>
        </div>
    </section>

    <section id="estatisticas">
        <h2>Estatísticas por Tipo</h2>
        <div id="cards-container"></div>
    </section>

    <section id="ocorrencias">
        <h2>Ocorrências Detalhadas</h2>
        <div id="ocorrencias-container"></div>
    </section>

    <script src="app.js"></script>
</body>
</html>
